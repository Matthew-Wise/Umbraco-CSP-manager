name: CSP Manager Build

on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'src/Umbraco.Community.CSPManager/**'
      - 'src/Umbraco.Community.CSPManager.Tests/**'
      - 'src/Umbraco.Community.CSPManager.Benchmarks/**'
      - 'src/Directory.Build.props'
      - 'src/Directory.Packages.props'
      - '.github/workflows/csp-manager.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/Umbraco.Community.CSPManager/**'
      - 'src/Umbraco.Community.CSPManager.Tests/**'
      - 'src/Umbraco.Community.CSPManager.Benchmarks/**'
      - 'src/Directory.Build.props'
      - 'src/Directory.Packages.props'
      - '.github/workflows/csp-manager.yml'

jobs:
  build:
    permissions:
      contents: read
      pull-requests: write

    env:
      LogFileName: "test-results.trx"
      ClientPROJECT: "./src/Umbraco.Community.CSPManager/Client"
      PROJECT: "./src/Umbraco.Community.CSPManager/Umbraco.Community.CSPManager.csproj"
      TESTPROJECT: "./src/Umbraco.Community.CSPManager.Tests/Umbraco.Community.CSPManager.Tests.csproj"
      TESTLOGPATH: "./src/Umbraco.Community.CSPManager.Tests/TestResults/"
      BUILD_VERSION: ${{ github.event.release.tag_name || '0.0.0' }}
      OUT_FOLDER: ./build-out/

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '${{env.ClientPROJECT}}/package.json'
          cache: 'npm'
          cache-dependency-path: '${{env.ClientPROJECT}}/package-lock.json'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ${{env.ClientPROJECT}}

      - name: Build Client
        run: npm run build
        working-directory: ${{env.ClientPROJECT}}

      - name: Build & Pack
        run: dotnet pack $PROJECT -c Release -p:Version=$BUILD_VERSION --output ${{env.OUT_FOLDER}}

      - name: Run tests
        run: dotnet test ${{env.TESTPROJECT}} -c Release --verbosity normal --filter "Category!=LongRunning" --logger "trx;LogFileName=$LogFileName"

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results
          path: "${{env.TESTLOGPATH}}${{env.LogFileName}}"

      - name: Upload nuget packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{env.OUT_FOLDER}}

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: nuget-csp
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
      - name: Download nuget packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./build-out/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: './build-out/*.nupkg'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish to NuGet
        run: dotnet nuget push ./build-out/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
